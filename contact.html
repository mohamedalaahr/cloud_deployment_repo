<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBrand - Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MyBrand.</div>
            <div class="nav-right">
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">🌙</button>
                <button class="hamburger" id="hamburger" title="Menu">☰</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-container">
            <h2>Let's Talk</h2>
            <p class="subtitle">Have a project in mind? Drop us a message and we'll get back to you shortly.</p>
            
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" placeholder="Tell us about your project..." required></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message ✉️</button>
            </form>
        </section>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">✅ Message sent successfully!</div>

    <footer>
        <p>&copy; 2024 MyBrand. Crafted with ❤️ for the web.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
